<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../img/icon/ChumChatLogotyp.ico" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- Google fonts end -->
    <!-- CSS -->
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/image.css">
    <!-- CSS ENDS -->
    <title>Chumchat</title>

</head>

<body>
    <nav>
        <a href="../index.html"><img src="../img/ChumChatLogotyp.png" class="logo" alt="loga för Chumchat" /></a>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <ul class="menu">
            <a id="google_translate_element"> </a>
            <button id="darkmodeButton">
                <img src="../img/svg/white.png">
            </button>
            <li id="user-area"></li>
        </ul>
    </nav>

    <main class="main" id="main">
        <div class="content">
            <div class="send-image-container">
                <form class="send-img">
                    <input class="img-area" placeholder="Write a image url" type="text" id="image-url" name="message">
                    <button type="submit" class="chat-send-button">Send</button>
                </form>
            </div>

            <div class="image-container"></div>
        </div>

    </main>

    <footer class="footer">
        <div id="weather-container">
            <h3 id="headerForWeather"></h3>
        </div>
        <ul>
            <li><a href="html/about.html">About</a></li>
            <li><a href="html/contact.html">Contact</a></li>
            <li><a href="#">ROM1</a></li>
            <li><a href="#">MEMES</a></li>
        </ul>
    </footer>
    <script type="module" src="../javascript/main.js"></script>
    <script type="module" src="../javascript/function/darkmode.js"></script>
    <script type="module" src="../javascript/function/hamburgermeny.js"></script>
    <script type="module" src="../javascript/function/confarmation.js"></script>
    <script type="module" src="../javascript/MessageFunctions/sendPicture.js"></script>
    <script type="module" src="../javascript/function/translate.js"></script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>

</html>
