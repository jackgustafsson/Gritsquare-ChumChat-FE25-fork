<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="shortcut icon" href="/img/icon/ChumChatLogotyp.ico" type="image/x-icon">
        <link rel="stylesheet" href="../style/login.css" />
    <link rel="stylesheet" href="../style/style.css" />
    <title>Chumchat|Login</title>
  </head>


  <body>
    <nav>
        <a href="../index.html"><img src="../img/ChumChatLogotyp.png" class="logo" alt="loga för Chumchat" /></a>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

         <ul class="menu">
             <button id="darkmodeButton">
                <img src="../img/svg/white.png">
             </button>
           
        </ul>
    </nav>

    <div class="container" id="main">
      <div class="register-card">
        <div class="header">
          <h1>LOG IN</h1>
        </div>

        <form class="form-body">
          <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" name="email" placeholder="EMAIL" class="inputDesign" required id="sigin-input"/>
          </div>

          <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" name="password" placeholder="PASSWORD" class="inputDesign" required id="sigin-password" />
          </div>

          <button type="submit" class="login-btn" id="login-button">LOG IN</button>
        </form>
        <a href="../html/register.html" class="accountalready">Don't have an account?</a>
      </div>
    </div>
     <footer class="footer">
        <div id="weather-container">
            <h3 id="headerForWeather"></h3>
        </div>
        <ul>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
             <li><a href="#">ROM1</a></li> 
           <li><a href="#">MEMES</a></li> 
        </ul>
    </footer>
    <script type="module" src="../javascript/Auth/loginUser.js"></script>
  </body>
  <script type="module" src="../javascript/function/darkmode.js"></script>
</html>
