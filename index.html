<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/icon/ChumChatLogotyp.ico" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script type="module" src="javascript/emoji.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <!-- Google fonts end -->
    <!-- CSS -->
    <link rel="stylesheet" href="style/style.css">
    <!-- CSS ENDS -->
    <title>Chumchat</title>

</head>

<body>
    <nav>
        <a href="index.html"><img src="img/ChumChatLogotyp.png" class="logo" alt="loga för Chumchat" /></a>
        <div class="hamburger" id="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

         <ul class="menu">
             <button id="darkmodeButton">
                <img src="img/svg/white.png">
             </button>
            <li id="user-area"></li>
        </ul>
    </nav>

<main class="main" id="main">
    <div class="content">
        <div class="send-chat-container">
            <form class="send-message" id="form-post">
                
                <div id="emoji-list" style="display: none; margin-bottom: 8px; cursor: pointer; font-size: 20px; gap: 10px; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 5px;">
                    <span>😀</span><span>😂</span><span>😍</span><span>👍</span><span>🔥</span><span>🚀</span>
                </div>

                <div style="display: flex; gap: 5px;">
                    <input placeholder="Write a message..." type="text" name="message" class="message-area" id="message-input" style="flex-grow: 1;" />
                    
                    <button type="button" id="emoji-toggle-btn" style="cursor: pointer; background: none; border: 1px solid #ccc; border-radius: 5px; padding: 0 10px;">😊</button>
                    
                    <button type="submit" class="chat-send-button">Send</button>
                </div>
            </form>
        </div>

        <div class="chat-container"></div>
    </div>
</main>

    <footer class="footer">
        <div id="weather-container">
            <h3 id="headerForWeather"></h3>
        </div>
        <ul>
            <li><a href="html/about.html">About</a></li>
            <li><a href="html/contact.html">Contact</a></li>
             <li><a href="#">ROM1</a></li> 
           <li><a href="#">MEMES</a></li> 
        </ul>
    </footer>
    <script type="module" src="javascript/main.js"></script>
    <script type="module" src="javascript/function/darkmode.js"></script>
    <script type="module" src="javascript/function/hamburgermeny.js"></script>
    <script type="module" src="./javascript/MessageFunctions/sendMessage.js"></script>
    <script type="module" src="javascript/function/confarmation.js"></script>
</body>

</html>
